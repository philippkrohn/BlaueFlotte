<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danke! | Willy Fick – Die Blaue Flotte</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: linear-gradient(165deg, #001a3a 0%, #002d5c 60%, #1a6fb5 100%);
  color: #fff;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
}
.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 3rem 2rem;
  max-width: 440px;
}
.icon { font-size: 3.5rem; margin-bottom: 1rem; }
h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  margin-bottom: 0.75rem;
}
p { opacity: 0.85; line-height: 1.6; margin-bottom: 1.5rem; }
a {
  display: inline-block;
  background: #e8a838;
  color: #001a3a;
  font-weight: 700;
  padding: 0.8rem 2rem;
  border-radius: 100px;
  text-decoration: none;
  transition: background 0.2s;
}
a:hover { background: #d4952e; }
</style>
</head>
<body>
<div class="card">
  <div class="icon">✅</div>
  <h1>Danke für deine Nachricht!</h1>
  <p>Wir haben deine Anfrage erhalten und melden uns in der Regel innerhalb von 1–2 Werktagen bei dir. Wir freuen uns!</p>
  <a href="index.html">← Zurück zur Seite</a>
</div>

<!-- Tracking-IDs werden später nach Einwilligungs- und Datenschutzprüfung ergänzt.
     Die Danke-Seite meldet einen Lead an Meta Pixel, Google Tag oder GTM,
     sobald eines dieser Systeme eingebunden ist. Direkte Seitenaufrufe zählen nicht als Lead. -->
<script>
(function () {
  function safeSessionGet(key) {
    try { return sessionStorage.getItem(key) || ''; } catch (error) { return ''; }
  }

  function safeSessionRemove(key) {
    try { sessionStorage.removeItem(key); } catch (error) { /* Storage optional */ }
  }

  const submissionPending = safeSessionGet('bf_lead_submission_pending') === '1';
  if (!submissionPending) return;

  const formType = safeSessionGet('bf_lead_form_type') || 'unbekannt';
  const eventParameters = {
    form_type: formType,
    lead_source: safeSessionGet('bf_utm_source') || 'direkt',
    campaign: safeSessionGet('bf_utm_campaign') || ''
  };

  window.dataLayer = window.dataLayer || [];
  window.dataLayer.push({ event: 'generate_lead', ...eventParameters });

  if (typeof window.fbq === 'function') {
    window.fbq('track', 'Lead', eventParameters);
  }

  if (typeof window.gtag === 'function') {
    window.gtag('event', 'generate_lead', eventParameters);
  }

  safeSessionRemove('bf_lead_submission_pending');
  safeSessionRemove('bf_lead_form_type');
}());
</script>
</body>
</html>
